<h2>Take Attendance</h2>

<form method="POST">

{% csrf_token %}

<label>Select Course</label>

<select name="course">

{% for course in courses %}

<option value="{{course.id}}">
{{course.course_name}}
</option>

{% endfor %}

</select>

<button type="submit">Load Students</button>

</form>


{% if students %}

<h3>Students</h3>

<form method="POST">

{% csrf_token %}

<input type="hidden" name="course" value="{{selected_course.id}}">

<table border="1">

<tr>
<th>Student</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for student in students %}

<tr>

<td>{{student.name}}</td>

<td>
<input type="radio" name="{{student.id}}" value="present">
</td>

<td>
<input type="radio" name="{{student.id}}" value="absent">
</td>

</tr>

{% endfor %}

</table>

<br>

<button name="save_attendance" type="submit">
Save Attendance
</button>

</form>

{% endif %}
