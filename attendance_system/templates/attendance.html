<h2>Attendance - {{course.course_name}}</h2>

<form method="POST">

{% csrf_token %}

<table border="1">

<tr>
<th>Student</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for student in students %}

<tr>

<td>{{student.name}}</td>

<td>
<input type="radio" name="{{student.id}}" value="present">
</td>

<td>
<input type="radio" name="{{student.id}}" value="absent">
</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit">Save Attendance</button>

</form>
